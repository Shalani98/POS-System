name: POS CI

# Trigger CI on pushes to main branch
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the latest code from GitHub
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Build Docker image
      - name: Build Docker image
        run: docker build -t pos-system .

      # Step 3: Run Docker container
      - name: Run Docker container
        run: |
          # Start container in detached mode
          docker run -d -p 5000:5000 pos-system
          echo "Waiting for app to start..."
          sleep 10  # wait for app to boot

      # Step 4: Test the app with retries
      - name: Test the app
        run: |
          for i in {1..10}; do
            curl http://localhost:5000 && break
            echo "Waiting for app..."
            sleep 2
          done

      # Step 5: Stop all containers to clean up
      - name: Stop Docker container
        run: docker stop $(docker ps -q) || true