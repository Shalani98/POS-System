<!DOCTYPE html>
<html>
<head>
    <title>Add Product</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f9;
        }

        /* Top Navigation */
        .navbar{
            background:#1f4037;
            color:white;
            padding:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .navbar h2{
            margin:0;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

        .navbar a:hover{
            text-decoration:underline;
        }

        /* Center container */
        .container{
            display:flex;
            justify-content:center;
            align-items:center;
            height:80vh;
        }

        /* Form card */
        .form-card{
            background:white;
            padding:35px;
            width:350px;
            border-radius:8px;
            box-shadow:0 8px 18px rgba(0,0,0,0.1);
        }

        .form-card h2{
            text-align:center;
            margin-bottom:25px;
        }

        /* Input fields */
        .input-group{
            margin-bottom:15px;
        }

        .input-group label{
            font-size:14px;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .input-group input:focus{
            outline:none;
            border-color:#1f4037;
        }

        /* Buttons */
        .btn{
            width:100%;
            padding:10px;
            border:none;
            background:#1f4037;
            color:white;
            font-size:15px;
            border-radius:5px;
            cursor:pointer;
        }

        .btn:hover{
            background:#145a52;
        }

        /* Back link */
        .back{
            display:block;
            text-align:center;
            margin-top:15px;
            text-decoration:none;
            color:#1f4037;
            font-weight:bold;
        }

        .back:hover{
            text-decoration:underline;
        }

    </style>

</head>

<body>

<div class="navbar">
    <h2>POS Management System</h2>
    <a href="/dashboard">Dashboard</a>
</div>

<div class="container">

    <div class="form-card">

        <h2>Add New Product</h2>

        <form method="post">

            <div class="input-group">
                <label>Product Name</label>
                <input type="text" name="name" required>
            </div>

            <div class="input-group">
                <label>Price</label>
                <input type="number" step="0.01" name="price" required>
            </div>

            <div class="input-group">
                <label>Stock Quantity</label>
                <input type="number" name="stock" required>
            </div>

            <input type="submit" value="Add Product" class="btn">

        </form>

        <a href="/dashboard" class="back">⬅ Back to Dashboard</a>

    </div>

</div>

</body>
</html>
