<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sales History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px 0;
        }
        table, th, td {
            border: 1px solid #333;
        }
        th, td {
            padding: 8px 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        a {
            margin-right: 10px;
        }
    </style>
</head>
<body>
<h2>Sales History</h2>

<a href="/dashboard">Back to Dashboard</a>
<a href="/logout">Logout</a>

<table>
    <tr>
        <th>ID</th>
        <th>Product Name</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Date</th>
    </tr>
    {% for sale in sales %}
    <tr>
        <td>{{ sale[0] }}</td>
        <td>{{ sale[1] }}</td>
        <td>{{ sale[2] }}</td>
        <td>{{ sale[3] }}</td>
        <td>{{ sale[4] }}</td>
    </tr>
    {% endfor %}
</table>

{% if not sales %}
<p>No sales recorded yet.</p>
{% endif %}
</body>
</html>
