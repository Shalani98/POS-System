<!DOCTYPE html>
<html>
<head>
    <title>POS System - Admin Login</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg,#1f4037,#99f2c8);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            background:white;
            padding:40px;
            width:350px;
            border-radius:10px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        .login-box h2{
            margin-bottom:25px;
            color:#333;
        }

        .input-group{
            text-align:left;
            margin-bottom:15px;
        }

        .input-group label{
            font-size:14px;
            color:#555;
        }

        .input-group input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:14px;
        }

        .input-group input:focus{
            outline:none;
            border-color:#1f4037;
        }

        .login-btn{
            width:100%;
            padding:10px;
            border:none;
            background:#1f4037;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#145a52;
        }

        .footer{
            margin-top:15px;
            font-size:12px;
            color:#888;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>POS Admin Login</h2>

    <form method="post">

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <input type="submit" value="Login" class="login-btn">

    </form>

    <div class="footer">
        POS Management System
    </div>

</div>

</body>
</html>
